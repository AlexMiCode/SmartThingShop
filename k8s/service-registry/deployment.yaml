apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-registry
  template:
    metadata:
      labels:
        app: service-registry
    spec:
      containers:
        - name: service-registry
          image: ghcr.io/your-org/smartthingshop-service-registry:latest
          ports:
            - containerPort: 8761
          envFrom:
            - configMapRef:
                name: smartthingshop-config
            - secretRef:
                name: smartthingshop-secret
