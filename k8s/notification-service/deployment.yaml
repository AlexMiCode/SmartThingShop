apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/your-org/smartthingshop-notification-service:latest
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: smartthingshop-config
            - secretRef:
                name: smartthingshop-secret
