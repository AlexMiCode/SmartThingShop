server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/products/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/orders/**
        - id: notification-service
          uri: lb://notification-service
          predicates:
            - Path=/api/notifications/**
security:
  jwt:
    secret: ${JWT_SECRET:smartthingshop-secret-12345678901234567890}
eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
